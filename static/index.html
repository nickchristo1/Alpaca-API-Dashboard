<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Auto-Rebalance MVO Portfolio Dashboard</title>

    <style>
        body { font-family: -apple-system, Times; margin: 15px; background: #0d1117; color: white; }
        h2 { margin-bottom: 15px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #161b22; border: 1px solid #30363d; color: #8b949e; padding: 10px 20px; 
            border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #58a6ff; color: white; border-color: #58a6ff; }

        .card { background: #161b22; padding: 16px; border-radius: 14px; margin-bottom: 12px; 
            box-shadow: 0 0 8px rgba(0,0,0,.3); }
        .label { color: #8b949e; font-size: 12px; }
        .value { font-size: 24px; margin-top: 4px; font-weight: bold; }
        .green { color: #2ecc71; } .red { color: #ff5c5c; }

        .heatmap-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 10px; margin-top: 15px; }
        .heatmap-cell { padding: 10px; border-radius: 8px; text-align: center; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; font-size: 13px; text-align: left; border-bottom: 1px solid #30363d; }
        #updated { margin-top: 10px; font-size: 11px; color: gray; }

        .top-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;  margin-bottom: 12px; }

        /* Mobile responsiveness */
        @media (max-width: 800px) { .top-metrics { grid-template-columns: 1fr; } }
    </style>
</head>

<body>

<h2>Weekly Auto-Rebalance MVO Portfolio Dashboard</h2>

<!-- Tab Navigation -->
<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('live')">Live Dashboard</button>
    <button class="tab-btn" onclick="switchTab('backtest')">Backtest Analytics</button>
</div>

<!-- LIVE DASHBOARD CONTENT -->
<div id="live-tab" class="content-tab">
    <div class="top-metrics">
        <div class="card"><div class="label">Total Equity</div><div class="value" id="equity">-</div></div>
        <div class="card"><div class="label">Daily PnL</div><div class="value" id="pnl">-</div></div>
        <div class="card"><div class="label">Portfolio Return</div><div class="value" id="live_twr">-</div></div>
    </div>
    <div class="card"><div class="label">1 Month Portfolio Value</div><canvas id="equityChart"></canvas></div>
    <div class="card"><div class="label">Open Positions</div>
        <table id="positions"><thead><tr>
                    <th>Symbol</th>
                    <th>Quantity</th>
                    <th>Market Value</th>
                    <th>Weight</th>
                    <th>Total P/L</th>
                    <th>% Return</th>
                    <th>Today</th>
                </tr></thead><tbody></tbody></table></div>
    </div>
</div>

<!-- BACKTEST CONTENT (Hidden by default) -->
<div id="backtest-tab" class="content-tab" style="display:none;">
    <div class="top-metrics">
        <div class="card"><div class="label">Backtest Return</div><div class="value" id="bt-ret">-</div></div>
        <div class="card"><div class="label">Sharpe Ratio</div><div class="value" id="bt-sharpe">-</div></div>
        <div class="card"><div class="label">Max Drawdown</div><div class="value" id="bt-dd">-</div></div>
    </div>
    <div class="card">
        <div class="label">Risk Attribution Heatmap</div>
        <div id="heatmap" class="heatmap-grid"></div>
    </div>
</div>

<div id="updated">Last updated: --</div>

<script>
function money(x) {
    return "$" + Number(x).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits:2});
}

function pct(x) {
    return (x >= 0 ? "+" : "") + Number(x).toFixed(2) + "%";
}

function switchTab(tabId) {
    document.querySelectorAll('.content-tab').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(tabId + '-tab').style.display = 'block';
    event.currentTarget.classList.add('active');
    if (tabId === 'backtest') loadBacktest(); // Trigger backtest load
}

async function loadBacktest() {
    const res = await fetch("/api/backtest");
    const data = await res.json();
    if (data.status === "processing") return;
    document.getElementById("bt-ret").innerText = (data.metrics.return * 100).toFixed(2) + "%";
    document.getElementById("bt-sharpe").innerText = data.metrics.sharpe.toFixed(2);
    document.getElementById("bt-dd").innerText = (data.metrics.max_drawdown * 100).toFixed(2) + "%";
    const heatDiv = document.getElementById("heatmap");
    heatDiv.innerHTML = Object.entries(data.attribution).map(([ticker, val]) => {
        return `<div class="heatmap-cell" style="background: rgba(255, 92, 92, ${Math.min(val*50, 1)});">
                    <div style="font-size: 11px;">${ticker}</div>
                    <div style="font-weight: bold;">${(val * 100).toFixed(1)}%</div>
                </div>`;
    }).join('');
}

let equityChart = null;
async function loadData() {
    try {
        let scrollY = window.scrollY;

        const res = await fetch("/api/portfolio");
        const data = await res.json();

        document.getElementById("equity").innerText = money(data.equity);

        const pnlEl = document.getElementById("pnl");

        const pnlText = `${money(data.pnl_daily)} (${pct(data.daily_return_pct)})`;

        pnlEl.innerText = pnlText;
        pnlEl.className = "value " + (data.pnl_daily >= 0 ? "green" : "red");

        const retEl = document.getElementById("live_twr");

        const retText = `${money(data.cum_return)} (${pct(data.live_twr*100)})`;

        retEl.innerText = retText;
        retEl.className = "value " + (data.live_twr >= 0 ? "green" : "red");

        const tbody = document.querySelector("#positions tbody");
        tbody.innerHTML = "";

        const history = data.history || [];

        const labels = history.map(x =>
            new Date(x.timestamp * 1000).toLocaleDateString()
        );

        const values = history.map(x => x.equity);

        if (equityChart) {
            equityChart.destroy();
        }


    const nonZeroValues = values.filter(v => v > 0);

    const minValue = Math.min(...nonZeroValues);
    const maxValue = Math.max(...nonZeroValues);

    const yMin = Math.floor(minValue / 200) * 200;
    const yMax = Math.ceil(maxValue / 200) * 200;

    const ctx = document.getElementById("equityChart").getContext("2d");

    equityChart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Equity",
                data: values,
                tension: 0.25
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    min: yMin,
                    max: yMax
                }
            }
        }
    });

    (data.positions || []).forEach(p => {
        const color = p.unrealized_pl >= 0 ? "green" : "red";
        const todayColor = p.today_pl >= 0 ? "green" : "red";

        const row = `
            <tr>
                <td>${p.symbol}</td>
                <td>${p.qty}</td>
                <td>${money(p.market_value)}</td>
                <td>${pct((p.market_value / data.equity) * 100)}</td>
                <td class="${color}">${money(p.unrealized_pl)}</td>
                <td class="${color}">${pct(p.return_pct)}</td>
                <td class="${todayColor}">
                    ${money(p.today_pl)} (${pct(p.today_return_pct)})
                </td>
            </tr>
        `;

        tbody.innerHTML += row;
    });

    document.getElementById("updated").innerText =
        "Last updated: " + new Date().toLocaleTimeString();

    window.scrollTo(0, scrollY);

    } catch (err) {
        console.log(err);
    }
}

loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
